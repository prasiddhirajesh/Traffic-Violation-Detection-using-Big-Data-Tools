version: '3.8'

services:
  traffic-zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: traffic-zookeeper
    container_name: traffic-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  traffic-kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: traffic-kafka
    container_name: traffic-kafka
    depends_on:
      - traffic-zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'traffic-zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://traffic-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # Create topics automatically on startup
  traffic-kafka-init-topics:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - traffic-kafka
    command: "bash -c 'echo Waiting for Kafka to be ready... && \
                       cub kafka-ready -b traffic-kafka:29092 1 20 && \
                       kafka-topics --create --topic traffic-stream --partitions 4 --replication-factor 1 --if-not-exists --bootstrap-server traffic-kafka:29092'"

  # Optional: For storing our processed streams
  traffic-mongodb:
    image: mongo:latest
    container_name: traffic-mongodb
    ports:
      - "27018:27017"

  # Optional: Web UI for viewing MongoDB data
  traffic-mongo-express:
    image: mongo-express
    container_name: traffic-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: pass
      ME_CONFIG_MONGODB_URL: mongodb://traffic-mongodb:27017/
    depends_on:
      - traffic-mongodb
